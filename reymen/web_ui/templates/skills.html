<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ReYMeN Skill Yönetimi</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config={darkMode:'class',theme:{extend:{colors:{dark:{bg:'#0d1117',card:'#161b22',border:'#30363d'}}}}}
</script>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:20px;margin-bottom:15px}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:.8em;font-weight:600}
</style>
</head>
<body class="bg-dark-bg text-gray-200 p-6">
<div class="max-w-6xl mx-auto">
  <h1 class="text-2xl font-bold text-blue-400 mb-6">📂 Skill Yönetimi</h1>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6" id="skill-stats">
    <div class="card text-center"><div class="text-3xl font-bold text-blue-400" id="skill-total">...</div><div class="text-gray-400">Toplam Skill</div></div>
    <div class="card text-center"><div class="text-3xl font-bold text-green-400" id="skill-aktif">...</div><div class="text-gray-400">Aktif</div></div>
    <div class="card text-center"><div class="text-3xl font-bold text-yellow-400" id="skill-kategori">...</div><div class="text-gray-400">Kategori</div></div>
  </div>

  <div class="card">
    <div class="flex gap-2 mb-4">
      <input id="skill-ara" type="text" placeholder="Skill ara..." class="flex-1 bg-dark-bg border border-dark-border rounded px-3 py-2 text-gray-200" oninput="skill_ara(this.value)">
      <select id="kategori-filtre" class="bg-dark-bg border border-dark-border rounded px-3 py-2 text-gray-200" onchange="skill_listele()">
        <option value="">Tüm Kategoriler</option>
      </select>
    </div>
    <div id="skill-liste" class="space-y-2"></div>
  </div>

  <div class="card mt-4">
    <h2 class="text-lg font-semibold mb-3">⚡ Hızlı İşlemler</h2>
    <div class="flex gap-2 flex-wrap">
      <button onclick="skill_tumunu_aktif_et()" class="bg-green-700 hover:bg-green-600 px-4 py-2 rounded text-sm">Tümünü Aktif Et</button>
      <button onclick="skill_index_yenile()" class="bg-blue-700 hover:bg-blue-600 px-4 py-2 rounded text-sm">Index'i Yenile</button>
      <button onclick="skill_kategorileri_tara()" class="bg-purple-700 hover:bg-purple-600 px-4 py-2 rounded text-sm">Kategorileri Tara</button>
    </div>
    <div id="islem-sonuc" class="mt-3 text-sm text-gray-400"></div>
  </div>
</div>

<script>
async function api(url, opt={}) {
  try {
    const r = await fetch(url, opt);
    return await r.json();
  } catch(e) { return {error: e.message}; }
}

async function skill_listele() {
  const kat = document.getElementById('kategori-filtre').value;
  const data = await api(`/api/skills${kat ? '?kategori='+kat : ''}`);
  const liste = document.getElementById('skill-liste');
  if (data.error) { liste.innerHTML = `<div class="text-red-400">Hata: ${data.error}</div>`; return; }
  const skills = data.skills || data || [];
  if (!skills.length) { liste.innerHTML = '<div class="text-gray-500">Skill bulunamadi.</div>'; return; }
  liste.innerHTML = skills.slice(0, 100).map(s => `
    <div class="flex items-center justify-between bg-dark-bg border border-dark-border rounded px-4 py-2">
      <div>
        <span class="font-medium">${s.ad || s.name || '?'}</span>
        <span class="text-gray-400 text-sm ml-2">${s.kategori || s.category || ''}</span>
      </div>
      <div class="flex gap-2 items-center">
        <span class="badge ${(s.aktif ?? s.active) ? 'bg-green-800 text-green-300' : 'bg-gray-700 text-gray-400'}">
          ${(s.aktif ?? s.active) ? 'Aktif' : 'Pasif'}
        </span>
        <button onclick="skill_aktif_et('${s.ad || s.name}')" class="text-xs bg-blue-700 hover:bg-blue-600 px-2 py-1 rounded">Aktif Et</button>
      </div>
    </div>
  `).join('');
  document.getElementById('skill-total').textContent = skills.length;
  document.getElementById('skill-aktif').textContent = skills.filter(s => s.aktif ?? s.active).length;
  document.getElementById('skill-kategori').textContent = new Set(skills.map(s => s.kategori || s.category || '')).size;
}

async function skill_ara(q) {
  if (!q || q.length < 2) { skill_listele(); return; }
  const data = await api(`/api/skills/ara?q=${q}`);
  const liste = document.getElementById('skill-liste');
  const skills = data.skills || data.results || [];
  liste.innerHTML = skills.slice(0, 50).map(s => `
    <div class="bg-dark-bg border border-dark-border rounded px-4 py-2">
      <span class="font-medium">${s.ad || s.name || s.dosya || '?'}</span>
      <span class="text-gray-400 text-sm ml-2">${s.kategori || s.category || ''}</span>
    </div>
  `).join('') || '<div class="text-gray-500">Sonuc yok.</div>';
}

async function skill_aktif_et(ad) {
  const r = await api('/api/skills/aktif_et', {method:'POST', body:JSON.stringify({ad}), headers:{'Content-Type':'application/json'}});
  document.getElementById('islem-sonuc').textContent = r.message || r.error || 'Tamam';
  skill_listele();
}

async function skill_tumunu_aktif_et() {
  document.getElementById('islem-sonuc').textContent = 'Tum skill'ler aktif ediliyor...';
  const r = await api('/api/skills/tumunu_aktif_et', {method:'POST'});
  document.getElementById('islem-sonuc').textContent = r.message || r.error || 'Tamam';
  skill_listele();
}

async function skill_index_yenile() {
  document.getElementById('islem-sonuc').textContent = 'Index yenileniyor...';
  const r = await api('/api/skills/index_yenile', {method:'POST'});
  document.getElementById('islem-sonuc').textContent = r.message || r.error || 'Tamam';
  skill_listele();
}

async function skill_kategorileri_tara() {
  document.getElementById('islem-sonuc').textContent = 'Kategoriler taranıyor...';
  const r = await api('/api/skills/kategoriler');
  const kat = document.getElementById('kategori-filtre');
  if (r.kategoriler) {
    kat.innerHTML = '<option value="">Tüm Kategoriler</option>' + r.kategoriler.map(k => `<option value="${k}">${k}</option>`).join('');
  }
  document.getElementById('islem-sonuc').textContent = `Kategoriler: ${(r.kategoriler||[]).length} bulundu`;
}

skill_listele();
skill_kategorileri_tara();
</script>
</body>
</html>
