<!DOCTYPE html>
{% extends "base.html" %}
{% block title %}Migration — ReYMeN Web UI{% endblock %}
{% block content %}
<div class="dashboard">
    <div class="page-header">
        <h2>🗄️ Database Migration</h2>
        <span class="gri">Alembic Schema Versioning</span>
    </div>

    <!-- Hızlı İşlemler -->
    <div class="kart">
        <h3>⚡ Hızlı İşlemler</h3>
        <div class="flex" style="gap:8px;flex-wrap:wrap;">
            <button class="btn" hx-get="/api/migration/status" hx-target="#migration-sonuc" hx-swap="innerHTML">📌 Durum</button>
            <button class="btn" hx-post="/api/migration/upgrade" hx-target="#migration-sonuc" hx-swap="innerHTML">🔼 Upgrade Head</button>
            <button class="btn" hx-post="/api/migration/downgrade" hx-target="#migration-sonuc" hx-swap="innerHTML">🔽 Downgrade -1</button>
            <button class="btn" hx-get="/api/migration/history" hx-target="#migration-sonuc" hx-swap="innerHTML">📜 History</button>
            <button class="btn" hx-get="/api/migration/check" hx-target="#migration-sonuc" hx-swap="innerHTML">🔍 Check</button>
        </div>
    </div>

    <!-- Yeni Migrasyon Oluştur -->
    <div class="kart">
        <h3>🆕 Yeni Migrasyon</h3>
        <form hx-post="/api/migration/create" hx-target="#migration-sonuc" hx-swap="innerHTML">
            <div class="flex" style="gap:8px;">
                <input type="text" name="message" placeholder="Migrasyon açıklaması (örn: add_users_table)" required
                       style="flex:1;padding:8px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text);">
                <button type="submit" class="btn">➕ Oluştur</button>
            </div>
        </form>
    </div>

    <!-- Upgrade/Downgrade Özel Revizyon -->
    <div class="kart">
        <h3>🔧 Özel Revizyon</h3>
        <div class="flex" style="gap:8px;flex-wrap:wrap;">
            <form hx-post="/api/migration/upgrade" hx-target="#migration-sonuc" hx-swap="innerHTML" style="display:flex;gap:6px;align-items:center;">
                <span class="gri">Upgrade:</span>
                <input type="text" name="revision" placeholder="revizyon ID (varsayılan: head)"
                       style="padding:6px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text);width:250px;">
                <button type="submit" class="btn btn-sm">🔼 Git</button>
            </form>
            <form hx-post="/api/migration/downgrade" hx-target="#migration-sonuc" hx-swap="innerHTML" style="display:flex;gap:6px;align-items:center;">
                <span class="gri">Downgrade:</span>
                <input type="text" name="revision" placeholder="revizyon ID (varsayılan: -1)"
                       style="padding:6px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text);width:250px;">
                <button type="submit" class="btn btn-sm">🔽 Git</button>
            </form>
        </div>
    </div>

    <!-- Sonuç Alanı -->
    <div class="kart" style="min-height:100px;">
        <h3>📋 Çıktı</h3>
        <div id="migration-sonuc" style="font-family:monospace;font-size:0.85rem;white-space:pre-wrap;overflow-x:auto;">
            <span class="gri">Bir işlem seçin...</span>
        </div>
    </div>
</div>
{% endblock %}
