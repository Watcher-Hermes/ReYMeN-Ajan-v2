{% extends "base.html" %}
{% block title %}📈 Coverage Raporu{% endblock %}
{% block content %}
<div class="page-header">
    <h1>📈 Coverage Raporu</h1>
    <div class="header-actions">
        <button class="btn btn-primary" onclick="coverageCalistir(false)">🔁 Tam Tarama</button>
        <button class="btn btn-secondary" onclick="coverageCalistir(true)">⚡ Hızlı Tarama</button>
    </div>
</div>

<!-- Özet Kartları -->
<div id="coverage-ozet" hx-get="/api/coverage/ozet" hx-trigger="load" hx-target="this" hx-swap="innerHTML">
    <div class="loader">⏳ Yükleniyor...</div>
</div>

<!-- Zaman Bazlı Grafik -->
<div class="card" style="margin-top:1rem;">
    <h3>📊 Zaman Bazlı Coverage Değişimi</h3>
    <div style="position:relative;height:300px;">
        <canvas id="coverage-chart"></canvas>
    </div>
</div>

<!-- Geçmiş Tablosu -->
<div class="card" style="margin-top:1rem;">
    <h3>📋 Geçmiş Kayıtlar</h3>
    <div id="coverage-gecmis" hx-get="/api/coverage/gecmis" hx-trigger="load" hx-target="this" hx-swap="innerHTML">
        <div class="loader">⏳ Yükleniyor...</div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function coverageCalistir(hizli) {
    const btn = event.target;
    btn.disabled = true;
    btn.innerHTML = '⏳ Çalışıyor...';
    htmx.ajax('POST', '/api/coverage/calistir' + (hizli ? '?hizli=true' : ''), {
        target: '#coverage-ozet',
        swap: 'innerHTML',
        handler: function() {
            btn.disabled = false;
            btn.innerHTML = hizli ? '⚡ Hızlı Tarama' : '🔁 Tam Tarama';
            // Grafiği yenile
            fetch('/api/coverage/gecmis-json')
                .then(r => r.json())
                .then(d => grafikCiz(d));
        }
    });
}

function grafikCiz(veri) {
    const ctx = document.getElementById('coverage-chart').getContext('2d');
    if (window._covChart) window._covChart.destroy();

    const etiketler = veri.map(v => {
        const d = new Date(v.tarih);
        return d.toLocaleDateString('tr-TR') + ' ' + d.toLocaleTimeString('tr-TR', {hour:'2-digit',minute:'2-digit'});
    });
    const yuzdeler = veri.map(v => v.yuzde);

    window._covChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: etiketler,
            datasets: [{
                label: 'Coverage %',
                data: yuzdeler,
                borderColor: '#22c55e',
                backgroundColor: 'rgba(34,197,94,0.1)',
                fill: true,
                tension: 0.4,
                pointRadius: 4,
                pointHoverRadius: 6,
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                tooltip: {
                    callbacks: {
                        label: ctx => `%: ${ctx.parsed.y}%`
                    }
                }
            },
            scales: {
                y: {
                    min: 0,
                    max: 100,
                    ticks: { callback: v => v + '%', color: '#aaa' },
                    grid: { color: 'rgba(255,255,255,0.05)' }
                },
                x: {
                    ticks: { maxTicksLimit: 15, color: '#aaa' },
                    grid: { display: false }
                }
            }
        }
    });
}

// Sayfa yüklenince grafiği çiz
document.addEventListener('DOMContentLoaded', function() {
    fetch('/api/coverage/gecmis-json')
        .then(r => r.json())
        .then(d => grafikCiz(d));
});
</script>
{% endblock %}
