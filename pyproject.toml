[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "reymen-agent"
version = "0.1.0"
description = "ReYMeN Agent - AI assistant with tool-calling capabilities"
requires-python = ">=3.11"
authors = [{name = "ReYMeN Team"}]
license = {text = "MIT"}
keywords = ["ai", "agent", "cli", "reymen"]

[project.scripts]
reymen = "reymen_launcher:main"
reymen-agent = "run_agent:main"

[tool.setuptools]
py-modules = ["reymen_launcher", "run_agent", "model_tools", "toolsets", "toolset_distributions", "batch_runner", "trajectory_compressor", "reymen_bootstrap", "reymen_constants", "reymen_state", "reymen_time", "reymen_logging", "utils", "mcp_serve"]
packages = ["agent", "agent.lsp", "agent.secret_sources", "agent.transports", "gateway", "gateway.builtin_hooks", "gateway.platforms", "gateway.platforms.qqbot", "gateway.relay", "plugins.browser.browser_use", "plugins.browser.browserbase", "plugins.browser.firecrawl", "plugins.context_engine", "plugins.cron", "plugins.cron.chronos", "plugins.dashboard_auth.basic", "plugins.dashboard_auth.nous", "plugins.dashboard_auth.self_hosted", "plugins.disk-cleanup", "plugins.google_meet", "plugins.google_meet.node", "plugins.google_meet.realtime", "plugins.image_gen.fal", "plugins.image_gen.krea", "plugins.image_gen.openai", "plugins.image_gen.openai-codex", "plugins.image_gen.xai", "plugins.memory", "plugins.memory.byterover", "plugins.memory.hindsight", "plugins.memory.holographic", "plugins.memory.honcho", "plugins.memory.mem0", "plugins.memory.openviking", "plugins.memory.retaindb", "plugins.memory.supermemory", "plugins.model-providers.alibaba", "plugins.model-providers.alibaba-coding-plan", "plugins.model-providers.anthropic", "plugins.model-providers.arcee", "plugins.model-providers.azure-foundry", "plugins.model-providers.bedrock", "plugins.model-providers.copilot", "plugins.model-providers.copilot-acp", "plugins.model-providers.custom", "plugins.model-providers.deepseek", "plugins.model-providers.gemini", "plugins.model-providers.gmi", "plugins.model-providers.huggingface", "plugins.model-providers.kilocode", "plugins.model-providers.kimi-coding", "plugins.model-providers.minimax", "plugins.model-providers.nous", "plugins.model-providers.novita", "plugins.model-providers.nvidia", "plugins.model-providers.ollama-cloud", "plugins.model-providers.openai-codex", "plugins.model-providers.opencode-zen", "plugins.model-providers.openrouter", "plugins.model-providers.qwen-oauth", "plugins.model-providers.stepfun", "plugins.model-providers.xai", "plugins.model-providers.xiaomi", "plugins.model-providers.zai", "plugins.observability.langfuse", "plugins.observability.nemo_relay